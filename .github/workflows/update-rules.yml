name: Update rules

on:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * 1"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fetch upstream data
        run: git clone --depth 1 https://github.com/v2fly/domain-list-community.git upstream
      - name: Generate rule files
        run: python3 scripts/build_rules.py upstream/data --repo upstream
      - name: Commit updates
        run: |
          if git diff --quiet; then
            echo "Rules are already current."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data rule
          git commit -m "Update Tencent rules"
          git push

